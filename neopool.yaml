#           id: np_write
#           op: 3                  # EXEC + SAVE (persist setpoint)
#
#   - platform: modbus_controller
#     modbus_controller_id: ${neopool_id}
#     device_id: ${neopool_device_id}
#     name: "${neopool_name} Redox Setpoint"
#     address: 0x0508            # MBF_PAR_RX1 (range 0..1000 mV)
#     register_type: holding
#     value_type: U_WORD
#     use_write_multiple: true
#     min_value: 0
#     max_value: 1000
#     step: 5
#     on_value:
#       - script.execute:
#           id: np_write
#           op: 3                  # EXEC + SAVE (persist setpoint)
#
#   - platform: modbus_controller
#     modbus_controller_id: ${neopool_id}
#     device_id: ${neopool_device_id}
#     name: "${neopool_name} Chlorine Setpoint"
#     address: 0x050A            # MBF_PAR_CL1 (range 0..1000 -> 0..10 ppm)
#     register_type: holding
#     value_type: U_WORD
#     use_write_multiple: true
#     multiply: 100              # 1.50 ppm -> 150
#     min_value: 0
#     max_value: 10
