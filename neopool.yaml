#     on_value:
#       - script.execute:
#           id: np_write
#           op: 3                  # EXEC + SAVE (persist setpoint)
#
#   - platform: modbus_controller
#     modbus_controller_id: ${neopool_id}
#     device_id: ${neopool_device_id}
#     name: "${neopool_name} pH Setpoint Low"
#     address: 0x0505            # MBF_PAR_PH2 (must stay < PH1)
#     register_type: holding
#     value_type: U_WORD
#     use_write_multiple: true
#     multiply: 100
#     min_value: 6.5
#     max_value: 8.0
#     step: 0.05
#     mode: box
#     on_value:
