#     address: 0x0502            # MBF_PAR_HIDRO (g/h mode here, /10)
#     register_type: holding
#     value_type: U_WORD
#     use_write_multiple: true
#     multiply: 10               # 12.0 g/h -> 120
#     min_value: 0
#     max_value: 100             # !! clamp to your MBF_PAR_HIDRO_NOM (0x0306) !!
#     step: 1
#     on_value:
#       - script.execute:
#           id: np_write
#           op: 3                  # EXEC + SAVE (persist setpoint)
#
# select:
#   - platform: modbus_controller
#     modbus_controller_id: ${neopool_id}
#     device_id: ${neopool_device_id}
#     name: "${neopool_name} Filtration Mode"
#     address: 0x0411            # MBF_PAR_FILT_MODE (no register_type on select)
#     use_write_multiple: true
#     optionsmap:
#       "Manual": 0              # MBV_PAR_FILT_*
#       "Auto": 1
#       "Heating": 2
#       "Smart": 3
#       "Intelligent": 4
#       "Backwash": 13
#     on_value:
#       - script.execute:
#           id: np_write
#           op: 2                  # EXEC only (mode change, transient)
